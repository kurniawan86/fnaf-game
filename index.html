<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FNAF Simulator - Main Menu</title>
  <style>
    :root {
      --primary-red: #e03030;
      --hover-red: #ff4d4d;
      --text-gray: #aaaaaa;
      --bg-overlay: rgba(10, 10, 10, 0.75);
    }

    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100vh;
      background-color: #000;
      font-family: 'Courier New', Courier, monospace;
      color: white;
      overflow: hidden;
      user-select: none;
    }

    /* Background Office Image */
    .bg-office {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('img/office.png');
      background-size: cover;
      background-position: center;
      filter: brightness(0.35) contrast(1.2) sepia(0.2);
      z-index: 1;
      animation: subtleZoom 25s infinite alternate linear;
    }

    @keyframes subtleZoom {
      0% {
        transform: scale(1);
      }

      100% {
        transform: scale(1.05);
      }
    }

    /* Static overlay for CCTV vibe */
    .static-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
      background: repeating-linear-gradient(0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.2) 2px,
          rgba(0, 0, 0, 0.2) 4px);
    }

    /* Main Menu Container */
    .menu-container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      height: 100%;
      padding-left: 8vw;
      background: linear-gradient(90deg, var(--bg-overlay) 0%, rgba(0, 0, 0, 0) 65%);
    }

    /* Title Styling */
    .game-title {
      font-size: clamp(3rem, 6vw, 5rem);
      font-weight: bold;
      color: white;
      text-shadow: 0 0 15px var(--primary-red), 0 0 30px var(--primary-red);
      margin-bottom: 0.5rem;
      letter-spacing: 6px;
    }

    .game-subtitle {
      font-size: 1.2rem;
      color: var(--text-gray);
      margin-bottom: 3.5rem;
      letter-spacing: 3px;
    }

    /* Menu Buttons */
    .menu-options {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .menu-btn {
      background: transparent;
      border: none;
      color: white;
      font-family: inherit;
      font-size: 1.8rem;
      text-align: left;
      cursor: pointer;
      padding: 5px 0;
      width: fit-content;
      position: relative;
      transition: color 0.3s, transform 0.2s;
      letter-spacing: 2px;
    }

    .menu-btn::before {
      content: '>> ';
      opacity: 0;
      color: var(--primary-red);
      transition: opacity 0.3s;
    }

    .menu-btn:hover {
      color: var(--hover-red);
      transform: translateX(15px);
    }

    .menu-btn:hover::before {
      opacity: 1;
    }

    /* Difficulty Section (Hidden by default) */
    .diff-panel {
      display: none;
      margin-top: 1rem;
      padding-left: 2.5rem;
      border-left: 2px solid var(--primary-red);
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-5px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .diff-panel.active {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .diff-btn {
      background: transparent;
      border: 1px solid var(--text-gray);
      color: var(--text-gray);
      padding: 6px 16px;
      font-family: inherit;
      font-size: 1.1rem;
      cursor: pointer;
      width: fit-content;
      transition: all 0.3s;
      letter-spacing: 1px;
    }

    .diff-btn:hover,
    .diff-btn.selected {
      border-color: var(--primary-red);
      color: white;
      background: rgba(224, 48, 48, 0.25);
      box-shadow: 0 0 12px rgba(224, 48, 48, 0.4);
    }

    /* Footer Details */
    .footer-details {
      position: absolute;
      bottom: 2rem;
      right: 2.5rem;
      text-align: right;
      font-size: 0.9rem;
      color: var(--text-gray);
      z-index: 10;
      letter-spacing: 1px;
    }

    .version {
      color: var(--primary-red);
      margin-top: 5px;
    }

    /* Start Overlay for Audio Unlock */
    #startOverlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      cursor: pointer;
      transition: opacity 0.5s ease;
    }

    .warning-text {
      color: var(--primary-red);
      font-size: 2.5rem;
      font-weight: bold;
      margin-bottom: 20px;
      letter-spacing: 4px;
    }

    .blink-text {
      animation: blinkUI 1.5s infinite;
      margin-top: 50px;
      color: #888;
      letter-spacing: 2px;
    }

    @keyframes blinkUI {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <!-- Layar Peringatan / Pemancing Audio -->
  <div id="startOverlay">
    <div class="warning-text">WARNING</div>
    <div style="max-width: 600px; line-height: 1.6; font-size: 1.2rem; color: #aaa;">
      This experience contains loud noises, flashing lights, and lots of jumpscares.<br><br>Please manage your volume.
    </div>
    <div class="blink-text">[ CLICK ANYWHERE TO START ]</div>
  </div>



  <!-- Background Layer -->
  <div class="bg-office"></div>
  <div class="static-overlay"></div>

  <!-- Menu UI -->
  <div class="menu-container">
    <div class="game-title">FNAF: ARE YOU READY NINO?</div>
    <div class="game-subtitle">Survive The Night...</div>

    <div class="menu-options">
      <!-- New Game Button -->
      <button class="menu-btn" onclick="startGame()">New Game</button>

      <!-- Difficulty Toggle -->
      <div>
        <button class="menu-btn" onclick="toggleDifficulty()">Difficulty</button>
        <div class="diff-panel" id="diffMenu">
          <button class="diff-btn" onclick="setDiff(this, 'Easy')">Easy</button>
          <button class="diff-btn selected" onclick="setDiff(this, 'Medium')">Medium</button>
          <button class="diff-btn" onclick="setDiff(this, 'Hard')">Hard</button>
        </div>
      </div>

      <!-- Details Button -->
      <button class="menu-btn" onclick="showDetails()">Details</button>

      <!-- Exit Button -->
      <button class="menu-btn" onclick="exitGame()">Exit</button>
    </div>
  </div>

  <div class="footer-details">
    <div>Nino's Studio © March, 2026</div>
    <div class="version">Build v1.0.3</div>
  </div>

  <script>
    // Menyembunyikan atau menampilkan menu difficulty
    function toggleDifficulty() {
      const panel = document.getElementById('diffMenu');
      panel.classList.toggle('active');
    }

    // Mengeset tingkat kesulitan
    function setDiff(element, level) {
      // Hilangkan class 'selected' dari semua tombol difficulty
      const btns = document.querySelectorAll('.diff-btn');
      btns.forEach(btn => btn.classList.remove('selected'));

      // Tambahkan class 'selected' ke tombol yang diklik
      element.classList.add('selected');

      // Di sini level ('Easy', 'Medium', 'Hard') bisa disimpan ke localStorage atau variabel sbg status game
      console.log('Difficulty changed to: ' + level);
    }

    // Mulai game baru
    function startGame() {
      // Delay alert sebentar agar suara klik sempat berbunyi sebelum browser membekukan layar
      setTimeout(() => {
        alert("Memulai shift malam...\n(Anda bisa arahkan ini ke index.html nantinya)");
      }, 150);
    }

    // Menampilkan detail game (Buka halaman blueprint)
    function showDetails() {
      // Pindahkan ke halaman details
      window.location.href = 'details.html';
    }

    function exitGame() {
      setTimeout(() => {
        if (confirm("Apakah Anda yakin ingin keluar?")) {
          window.close();
        }
      }, 150);
    }

    // --- AUDIO ENGINE ---
    let audioCtx = null;
    let ambientStarted = false;

    // Siapkan file audio ambience
    const ambientAudio = new Audio('audio/ambience.mp3');
    ambientAudio.loop = false; // Mengulang otomatis
    ambientAudio.volume = 0.3; // Volume 60%

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        console.log("Audio Context Dibuat (untuk efek klik)");
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }

      if (!ambientStarted) {
        startAmbient();
        ambientStarted = true;
      }
    }

    // Suara background drone menakutkan (Ambient dari file)
    function startAmbient() {
      console.log("Memutar file audio/ambience.mp3...");
      ambientAudio.play().catch(e => {
        console.error("Autoplay ditahan oleh browser:", e);
      });
    }

    // Suara klik tombol (UI sound)
    function playClick() {
      initAudio();
      if (!audioCtx) return;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = 'square';
      osc.frequency.setValueAtTime(600, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);

      gain.gain.setValueAtTime(0.3, audioCtx.currentTime); // Volume klik diperbesar
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start();
      osc.stop(audioCtx.currentTime + 0.15);
    }

    // Suara saat mouse menyorot (hover) tombol (UI Blip)
    function playHover() {
      if (!audioCtx || audioCtx.state === 'suspended') return;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = 'square';
      osc.frequency.setValueAtTime(800, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);

      gain.gain.setValueAtTime(0.1, audioCtx.currentTime); // Volume sedang
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start();
      osc.stop(audioCtx.currentTime + 0.06);
    }

    // Menggunakan layar peringatan untuk memaksa klik pertama sebelum menu utama
    document.getElementById('startOverlay').addEventListener('click', function () {
      // Hilangkan layar peringatan
      this.style.opacity = '0';
      this.style.pointerEvents = 'none';
      setTimeout(() => this.style.display = 'none', 500);

      // Paksa load file audio (membantu sinkronisasi jika dijalankan via file://)
      ambientAudio.load();
      initAudio();
    }, { once: true });

    // Pasang event penangkap klik dan hover ke semua tombol agar bunyi
    document.querySelectorAll('.menu-btn, .diff-btn').forEach(btn => {
      btn.addEventListener('click', playClick);
      btn.addEventListener('mouseenter', playHover);
    });
  </script>
</body>

</html>
